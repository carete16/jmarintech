<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masbarato Express | Gánale al comercio local</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af; /* Deep Navy Blue for Trust */
            --secondary: #1d4ed8;
            --accent: #38bdf8;  /* Sky Blue for Tech features */
            --danger: #e11d48;  /* Action Red for Price */
            --success: #25d366; /* WhatsApp Green */
            --bg-sidebar: #ffffff;
            --bg-main: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            display: flex;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* SIDEBAR */
        .sidebar {
            width: 210px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
            color: #4f46e5;
            font-weight: 800;
            font-size: 1rem;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: #4f46e5;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white;
        }

        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover, .nav-item.active {
            background: #f1f5f9;
            color: var(--text-main);
        }
        .nav-item i { width: 16px; font-size: 0.9rem; }

        .agent-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px;
            margin-top: auto;
        }
        .agent-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .agent-text {
            font-size: 0.72rem;
            line-height: 1.4;
            color: #64748b;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            margin-left: 210px;
            padding: 32px;
            max-width: 1200px;
            width: 100%;
        }

        /* HERO SECTION: TECH-PREMIUM */
        .hero {
            background: linear-gradient(135deg, #020617 0%, #1e1b4b 100%);
            border-radius: 32px;
            padding: 80px 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(30,58,138,0.3) 0%, transparent 60%);
            z-index: 0;
        }
        .hero-badge {
            position: relative;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(13, 148, 136, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(20, 184, 166, 0.4);
            color: #2dd4bf;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .hero h1 {
            position: relative;
            z-index: 10;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 24px;
        }
        .hero h1 span {
            color: #38bdf8;
            text-shadow: 0 0 30px rgba(56,189,248,0.3);
        }
        .hero p {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            font-weight: 500;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-input-wrapper {
            flex: 1;
            position: relative;
        }
        .search-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .search-input {
            width: 100%;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 14px 14px 44px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26,86,219,0.05); }

        /* GRID: 2 COLUMNS ON DESKTOP */
        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 30px;
        }

        @media (min-width: 1200px) {
            .deals-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ULTRA PREMIUM DESIGN SYSTEM (APPLE/AMAZON STYLE) */
        .poster-card {
            background: #ffffff;
            border-radius: 0;
            padding: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 700px;
            overflow: hidden;
            text-align: center;
        }
        .poster-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }

        /* HEADER: CENTERED TITLES */
        .poster-header { margin-bottom: 40px; z-index: 10; position: relative; }
        .main-title { font-size: 2.8rem; font-weight: 900; color: #000; line-height: 1; letter-spacing: -2px; text-transform: uppercase; margin-bottom: 10px; }
        .subtitle { font-size: 1.8rem; font-weight: 700; color: #1e293b; letter-spacing: -1px; }

        /* PRICE: TOP RIGHT BOX (SUBTLE) */
        .price-section { position: absolute; top: 15px; right: 15px; z-index: 20; }
        .price-value { background: #dc2626; color: white; font-size: 2.2rem; font-weight: 900; padding: 6px 18px; box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2); border-radius: 6px; letter-spacing: -1px; }

        /* CONTENT GRID */
        .poster-middle { display: grid; grid-template-columns: 1fr; gap: 20px; position: relative; z-index: 10; margin-bottom: 20px; text-align: left; }
        
        /* SPECS 2 COLUMNS (FORMATO OBLIGATORIO) */
        .specs-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px 40px; 
            margin-bottom: 30px; 
            max-width: 500px;
        }
        .spec-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 700; color: #334155; }
        .spec-item i { font-size: 1.1rem; color: #000; width: 20px; text-align: center; }

        /* IMAGE CENTER/RIGHT (DOMINANTE 60%+) */
        .poster-image-area { display: flex; align-items: center; justify-content: center; position: relative; min-height: 450px; flex: 1; }
        .poster-image-area img { max-width: 90%; max-height: 500px; object-fit: contain; filter: drop-shadow(0 40px 50px rgba(0,0,0,0.15)); cursor: zoom-in; }

        /* BADGES ON IMAGE */
        .float-badge { position: absolute; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 8px 15px; font-weight: 800; font-size: 1.1rem; color: #000; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 15; }
        .badge-ram { left: 10%; top: 30%; }
        .badge-ssd { left: 10%; top: 50%; }

        /* FOOTER: CLEAN ROW */
        .poster-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 30px; border-top: 1px solid #f1f5f9; }
        
        .footer-icons { display: flex; align-items: center; gap: 25px; }
        .wa-btn { color: #000; font-size: 2.5rem; text-decoration: none; transition: 0.2s; }
        .wa-btn:hover { color: #25D366; transform: scale(1.1); }

        .footer-badge-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 800; color: #64748b; }
        .footer-badge-item i { font-size: 1.2rem; color: #000; }

        .warranty-box { text-align: right; }
        .warranty-shield { background: #000; color: #fff; padding: 10px 15px; border-radius: 8px; font-weight: 900; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .warranty-shield small { font-size: 0.6rem; letter-spacing: 1px; }

        .poster-watermark { font-size: 1.5rem; font-weight: 800; color: #cbd5e1; letter-spacing: 10px; margin-top: 20px; text-transform: uppercase; }

        /* RESPONSIVE OVERRIDES */
        @media (max-width: 768px) {
            .poster-card { padding: 25px; min-height: auto; }
            .main-title { font-size: 1.8rem; }
            .subtitle { font-size: 1.2rem; }
            .price-value { font-size: 2rem; position: static; border-radius: 8px; margin-bottom: 20px; }
            .poster-middle { grid-template-columns: 1fr; gap: 20px; }
            .specs-column { border-right: none; border-bottom: 1px solid #f1f5f9; padding-right: 0; padding-bottom: 20px; }
            .float-badge { display: none; }
            .poster-footer { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="/" class="logo">
            <div class="logo-icon"><i class="fa-solid fa-paper-plane"></i></div>
            Masbarato Express
        </a>

        <nav class="nav-list">
            <button class="nav-item active"><i class="fa-solid fa-bolt"></i> Ofertas Flash</button>
            <button class="nav-item" onclick="window.open('https://wa.me/573012722472','_blank')"><i class="fa-brands fa-whatsapp"></i> Soporte VIP</button>
            <button class="nav-item"><i class="fa-solid fa-shield"></i> Garantía Legal</button>
        </nav>

        <div class="agent-card">
            <div class="agent-label">Tu agente en USA</div>
            <div class="agent-text">Buscamos, compramos e importamos por ti. Sin casilleros complicados.</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="hero">
            <div class="hero-badge">⭐ CALIDAD PROFESIONAL CERTIFICADA</div>
            <h1>Tecnología de alto nivel a <span>tu alcance.</span></h1>
            <p>Equipos empresariales seleccionados y garantizados por expertos. El mejor rendimiento al precio más bajo del mercado.</p>
        </div>

        <div class="search-container">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="¿Qué buscas hoy? Busca por producto, marca o tienda...">
            </div>
        </div>

        <div class="deals-grid" id="dealsGrid">
            <!-- Cargando... -->
        </div>
    </main>

    <!-- Modal para Zoom de Poster Completo -->
    <div id="posterModal" class="poster-modal" onclick="closePoster()">
        <span class="close-modal">&times;</span>
        <div class="poster-modal-content" id="posterContent" onclick="event.stopPropagation()"></div>
    </div>

    <style>
        .poster-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); overflow-y: auto; padding: 20px; }
        .poster-modal-content { max-width: 900px; margin: 40px auto; transform: scale(1.1); }
        .close-modal { position: fixed; top: 20px; right: 30px; font-size: 50px; cursor: pointer; color: #000; z-index: 2001; }
        
        .poster-card { cursor: pointer; }
        .wa-btn { cursor: pointer; z-index: 100; }
    </style>

    <script>
        const WA_PHONE = '573012722472';
        let allDeals = [];

        const formatCOP = (val) => {
            if (!val) return 'Consultar';
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(val);
        };

        async function init() {
            try {
                const res = await fetch('/api/deals/express?t=' + Date.now());
                allDeals = await res.json();
                render(allDeals);
            } catch (err) {
                console.error(err);
                document.getElementById('dealsGrid').innerHTML = '<p>Error cargando ofertas.</p>';
            }
        }

        function render(deals) {
            const grid = document.getElementById('dealsGrid');
            if (deals.length === 0) {
                grid.innerHTML = '<p>No hay ofertas disponibles.</p>';
                return;
            }

            grid.innerHTML = deals.map(deal => {
                const priceStr = formatCOP(deal.price_cop);
                const waLink = `https://wa.me/${WA_PHONE}?text=${encodeURIComponent(`Hola! Me interesa: ${deal.title}\nPrecio: ${priceStr}\nLink: ${window.location.origin}/go/${deal.id}`)}`;
                
                let specs = {};
                try { 
                    specs = typeof deal.structured_specs === 'string' ? JSON.parse(deal.structured_specs) : (deal.structured_specs || {});
                } catch(e) { specs = {}; }

                // NORMALIZACIÓN DE SPECS (REGLA CRÍTICA)
                const normalize = (val, type) => {
                    if (!val) return "";
                    let v = val.replace(/\(.*\)/g, "").trim(); // Eliminar paréntesis
                    if (type === 'cpu') {
                        v = v.replace(/Celeron Quad-Core/gi, "Quad-Core");
                        v = v.replace(/Intel Core/gi, "Intel");
                    }
                    if (type === 'screen') v = v.replace(/pulgadas|inch/gi, "").trim() + '"';
                    if (type === 'disk') v = v.replace(/Solid State Drive/gi, "SSD");
                    return v;
                };

                const cleanSpecs = {
                    cpu: normalize(specs.cpu || "Intel Quad-Core", 'cpu'),
                    ram: specs.ram || "16GB RAM",
                    disk: normalize(specs.disk || "512GB SSD", 'disk'),
                    screen: normalize(specs.screen || "15.6", 'screen'),
                    speed: specs.speed || "1.7 GHz",
                    wifi: "WiFi + BT",
                    camera: "Cámara HD"
                };

                // EXTRAER MARCA (REGLA SOLICITADA)
                const knownBrands = ['HP', 'DELL', 'LENOVO', 'APPLE', 'ASUS', 'ACER', 'MICROSOFT', 'SAMSUNG', 'MSI', 'ALIENWARE', 'RAZER', 'LG', 'GATEWAY', 'HUAWEI'];
                let brandFound = "";
                const firstWord = deal.title.split(' ')[0].toUpperCase();
                if (knownBrands.includes(firstWord)) {
                    brandFound = firstWord;
                } else {
                    // Si no es la primera palabra, buscar en las primeras 3
                    const titleParts = deal.title.toUpperCase().split(' ');
                    for (let i = 0; i < 3; i++) {
                        if (knownBrands.includes(titleParts[i])) {
                            brandFound = titleParts[i];
                            break;
                        }
                    }
                }
                
                // LIMPIEZA DE TÍTULO COMERCIAL CON MARCA
                let mainTitle = `${brandFound} Laptop ${cleanSpecs.cpu} ${cleanSpecs.ram} ${cleanSpecs.disk}`.trim();
                let subTitle = "Edición Especial Profesional";
                if (mainTitle.length > 55) mainTitle = mainTitle.substring(0, 52) + "...";

                return `
                <div class="poster-card" onclick="openPoster(this)">
                    <!-- HEADER -->
                    <div class="poster-header" style="text-align: left; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                        <div style="flex: 1;">
                            <div class="main-title" style="font-size: 1.8rem; margin-bottom: 2px; line-height: 1.2;">${mainTitle}</div>
                        </div>
                        <div style="text-align: right; padding-top: 5px;">
                            <div style="background: #dc2626; color: white; font-size: 1.8rem; font-weight: 900; padding: 4px 15px; border-radius: 4px;">${priceStr}</div>
                        </div>
                    </div>

                    <!-- MIDDLE AREA -->
                    <div class="poster-middle">
                        <div class="specs-grid">
                            <div class="spec-item"><i class="fa-solid fa-microchip"></i> <span>${cleanSpecs.cpu}</span></div>
                            <div class="spec-item"><i class="fa-solid fa-memory"></i> <span>${cleanSpecs.ram}</span></div>
                            <div class="spec-item"><i class="fa-solid fa-hard-drive"></i> <span>${cleanSpecs.disk}</span></div>
                            <div class="spec-item"><i class="fa-solid fa-desktop"></i> <span>${cleanSpecs.screen} FHD</span></div>
                            <div class="spec-item"><i class="fa-solid fa-gauge-high"></i> <span>${cleanSpecs.speed}</span></div>
                            <div class="spec-item"><i class="fa-solid fa-wifi"></i> <span>WiFi + BT</span></div>
                        </div>

                        <div class="poster-image-area">
                            <!-- BADGES -->
                            ${cleanSpecs.ram ? `<div class="float-badge badge-ram">${cleanSpecs.ram}</div>` : ''}
                            ${cleanSpecs.disk ? `<div class="float-badge badge-ssd">${cleanSpecs.disk}</div>` : ''}
                            
                            <img src="/api/proxy-image?url=${encodeURIComponent(deal.image)}" onerror="this.src='https://placehold.co/400x300?text=Sin+Imagen'">
                        </div>
                    </div>

                    <!-- FOOTER SIMPLIFICADO (OBLIGATORIO) -->
                    <div class="poster-footer" style="padding-top: 15px; border-top: 1px solid #f1f5f9;">
                        <div class="footer-icons" style="gap: 20px; align-items: center;">
                            <a href="${waLink}" target="_blank" class="wa-btn" onclick="event.stopPropagation()" style="font-size: 2rem;">
                                <i class="fa-brands fa-whatsapp"></i>
                            </a>
                            <div style="font-size: 0.9rem; font-weight: 800; color: #1e293b;">
                                <i class="fa-solid fa-shield-halved" style="margin-right: 5px;"></i> 6 meses garantía
                            </div>
                        </div>
                        
                        <div style="font-size: 0.8rem; font-weight: 800; color: #cbd5e1; letter-spacing: 2px;">👉 Renovado Certificado</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Filtering
        // Filtering
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allDeals.filter(d => {
                return d.title.toLowerCase().includes(term) || (d.tienda || '').toLowerCase().includes(term);
            });

            render(filtered);
        }

        // Modal Functions
        function openPoster(card) {
            const modal = document.getElementById('posterModal');
            const content = document.getElementById('posterContent');
            content.innerHTML = card.innerHTML;
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closePoster() {
            document.getElementById('posterModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        init();
    </script>
</body>
</html>
